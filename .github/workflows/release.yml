name: Create GitHub Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: repo
    steps:
      - uses: actions/checkout@v6
        with:
          path: repo

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore
        run: |
          dotnet restore ./src/ConsoleReader/ConsoleReader.csproj --force
          dotnet restore ./src/ReplayWatcher/ReplayWatcher.csproj --force

      - name: Publish ConsoleReader single-file EXE
        run: dotnet publish ./src/ConsoleReader/ConsoleReader.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:RestoreForce=true -p:ImportProjectExtensionProps=false -p:ImportProjectExtensionTargets=false -o ./dist/ConsoleReader

      - name: Publish ReplayWatcher single-file EXE
        run: dotnet publish ./src/ReplayWatcher/ReplayWatcher.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:RestoreForce=true -p:ImportProjectExtensionProps=false -p:ImportProjectExtensionTargets=false -o ./dist/ReplayWatcher

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            repo/dist/ConsoleReader/ConsoleReader.exe
            repo/dist/ReplayWatcher/ReplayWatcher.exe