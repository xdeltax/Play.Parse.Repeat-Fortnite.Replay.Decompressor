name: Build

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: repo

    steps:
      - uses: actions/checkout@v6
        with:
          path: repo
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
      - run: dotnet restore ./FortniteReplayDecompressor.slnx --force
      - name: Ensure project extension imports exist
        shell: pwsh
        run: |
          $projectFiles = Get-ChildItem -Path ./src -Recurse -Filter *.csproj
          foreach ($project in $projectFiles) {
            $objDir = Join-Path $project.DirectoryName "obj"
            New-Item -ItemType Directory -Force -Path $objDir | Out-Null

            $propsPath = Join-Path $objDir ("{0}.ci.props" -f $project.Name)
            $targetsPath = Join-Path $objDir ("{0}.ci.targets" -f $project.Name)

            if (-not (Test-Path $propsPath)) {
              Set-Content -Path $propsPath -Value "<Project />" -Encoding UTF8
            }

            if (-not (Test-Path $targetsPath)) {
              Set-Content -Path $targetsPath -Value "<Project />" -Encoding UTF8
            }
          }
      - run: dotnet build ./FortniteReplayDecompressor.slnx --configuration Release --no-restore
      - run: dotnet test ./FortniteReplayDecompressor.slnx --coverage --report-github --no-restore
